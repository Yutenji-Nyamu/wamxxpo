defaults:
  - env/robotwin_adjust_bottle@env.eval
  - model/motus@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env, rollout: 0

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_motus_eval_batch8_autodl"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"
  enable_offload: True

  eval:
    rollout_epoch: 1
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True

    max_episode_steps: 400
    max_steps_per_rollout_epoch: 400

    reward_coef: 1.0
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True

    assets_path: "/root/autodl-tmp/RoboTwin_RLinf"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json

    video_cfg:
      save_video: False
      info_on_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

    center_crop: False
    task_config:
      step_lim: 400
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
